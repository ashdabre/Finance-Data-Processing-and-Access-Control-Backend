<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Financial Records</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 30px; background: #f8f9fa; font-family: Arial; }
    .card { margin-bottom: 20px; }
    table { margin-top: 15px; }
    .btn-primary { background-color: #4a90e2; border: none; }
    .btn-primary:hover { background-color: #357abd; }
  </style>
</head>
<body>

<div class="container">

  <h1 class="mb-4 text-center">Financial Records</h1>

  <!-- Add Record (Admin only) -->
  <div class="card p-3 shadow-sm" id="addRecordCard">
    <h5>Add Record (Admin)</h5>
    <div class="row g-2 mb-2">
      <div class="col-md-2"><input id="amount" class="form-control" placeholder="Amount"></div>
      <div class="col-md-2">
        <select id="type" class="form-select">
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
      </div>
      <div class="col-md-3"><input id="category" class="form-control" placeholder="Category"></div>
      <div class="col-md-3"><input type="date" id="date" class="form-control"></div>
      <div class="col-md-2">
        <button class="btn btn-primary w-100" onclick="addRecordToBatch()">Add to Batch</button>
      </div>
    </div>
    <button class="btn btn-success w-100" onclick="submitBatch()">Submit All Records</button>

    <div class="mt-3">
      <h6>Batch Records:</h6>
      <ul id="batchList"></ul>
    </div>
  </div>

  <!-- Filter Records -->
  <div class="card p-3 shadow-sm">
    <h5>Filter Records</h5>
    <div class="row g-2">
      <div class="col-md-2">
        <select id="filterType" class="form-select">
          <option value="">All Types</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
      </div>
      <div class="col-md-3"><input id="filterCategory" class="form-control" placeholder="Category"></div>
      <div class="col-md-2"><input type="date" id="startDate" class="form-control"></div>
      <div class="col-md-2"><input type="date" id="endDate" class="form-control"></div>
      <div class="col-md-3"><button class="btn btn-primary w-100" onclick="getRecords()">Apply Filter</button></div>
    </div>
  </div>

  <!-- Records Table -->
  <div class="card shadow-sm p-3">
    <h5>Records</h5>
    <div class="table-responsive">
      <table class="table table-striped table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Amount</th>
            <th>Type</th>
            <th>Category</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="recordsTable"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));
if(!user || !user.id){
  alert("You must log in first!");
  window.location.href = "index.html";
}

// Hide Add Record section if not admin
if(user.role !== "admin"){
  document.getElementById("addRecordCard").style.display = 'none';
}

let batchRecords = [];

function addRecordToBatch() {
  const amount = document.getElementById("amount").value;
  const type = document.getElementById("type").value;
  const category = document.getElementById("category").value;
  const date = document.getElementById("date").value;

  if(!amount || !category || !date) return alert("All fields are required!");

  batchRecords.push({
    userId: user.id,
    amount, type, category, date
  });

  renderBatch();
}

function renderBatch() {
  const list = document.getElementById("batchList");
  list.innerHTML = batchRecords.map((r, i) => `<li>${i+1}: ${r.amount} - ${r.type} - ${r.category} - ${r.date}</li>`).join("");
}

async function submitBatch() {
  if(batchRecords.length === 0) return alert("Add at least one record to submit!");

  const res = await fetch("http://localhost:5002/records", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(batchRecords)
  });

  const data = await res.json();
  alert(data.message || JSON.stringify(data));
  batchRecords = [];
  renderBatch();
  getRecords();
}

// Fetch records
async function getRecords() {
  const type = document.getElementById("filterType").value;
  const category = document.getElementById("filterCategory").value;
  const startDate = document.getElementById("startDate").value;
  const endDate = document.getElementById("endDate").value;

  let query = [];
  if(type) query.push(`type=${type}`);
  if(category) query.push(`category=${category}`);
  if(startDate && endDate) query.push(`startDate=${startDate}&endDate=${endDate}`);

  const res = await fetch(`http://localhost:5002/records?${query.join("&")}`);
  const data = await res.json();

  const table = document.getElementById("recordsTable");
  table.innerHTML = data.map(r => `
    <tr>
      <td>${r.id}</td>
      <td>${r.amount}</td>
      <td>${r.type}</td>
      <td>${r.category}</td>
      <td>${r.date}</td>
    </tr>
  `).join("");
}

getRecords();
</script>

</body>
</html>
