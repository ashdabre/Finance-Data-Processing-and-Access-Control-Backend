<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; padding: 30px; font-family: Arial; }
    .card { margin: 10px; text-align: center; }
    .btn-primary { background-color: #4a90e2; border: none; }
  </style>
</head>
<body>

<div class="container">
  <h1 class="text-center mb-4">Dashboard</h1>
  <div class="row" id="summaryCards">
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h5>Total Income</h5>
        <h3 id="totalIncome">0</h3>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h5>Total Expense</h5>
        <h3 id="totalExpense">0</h3>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h5>Net Balance</h5>
        <h3 id="netBalance">0</h3>
      </div>
    </div>
  </div>

  <div class="text-center mt-4">
    <button class="btn btn-primary" onclick="goToRecords()">View Records</button>
  </div>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if(!user || !localStorage.getItem("token")) {
  alert("You must log in first!");
  window.location.href = "index.html";
}

async function loadDashboard() {
  const token = localStorage.getItem("token");
  const res = await fetch("http://localhost:5002/dashboard/summary", {
    headers: { Authorization: `Bearer ${token}` }
  });
  const data = await res.json();

  if(data.error){
    alert(data.error);
    window.location.href = "index.html";
    return;
  }

  document.getElementById("totalIncome").innerText = data.totalIncome || 0;
  document.getElementById("totalExpense").innerText = data.totalExpense || 0;
  document.getElementById("netBalance").innerText = data.netBalance || 0;
}

function goToRecords() {
  window.location.href = "records.html";
}

loadDashboard();
</script>
</body>
</html>
